name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  api-ci:
    name: API - Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Lint
        working-directory: api
        run: npm run lint

      - name: Test
        working-directory: api
        run: npm test
        env:
          NODE_ENV: test

  web-ci:
    name: Web - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm install

      - name: Build
        working-directory: web
        run: npm run build
        env:
          CI: false
          REACT_APP_VERSION: ${{ github.sha }}

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [api-ci, web-ci, secret-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scm-api:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/scm-api:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
            GIT_COMMIT=${{ github.sha }}

      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scm-web:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/scm-web:latest
          build-args: |
            REACT_APP_VERSION=${{ steps.version.outputs.VERSION }}
            REACT_APP_ENV=production
