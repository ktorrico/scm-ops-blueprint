services:
  db:
    image: postgres:16-alpine
    container_name: scm_db_dev
    environment:
      POSTGRES_DB: scmdb
      POSTGRES_USER: scmuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scmuser -d scmdb"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    image: scm-api:0.1.0
    container_name: scm_api_dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://scmuser:${DB_PASSWORD}@db:5432/scmdb
      APP_VERSION: ${APP_VERSION:-0.1.0}
      FEATURE_NEW_ITEMS_UI: ${FEATURE_NEW_ITEMS_UI:-false}
      FEATURE_MAINTENANCE: ${FEATURE_MAINTENANCE:-false}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
  web:
    image: scm-web:0.1.0
    container_name: scm_web_dev
    ports:
      - "80:80"
    depends_on:
      - api
  flyway:
    image: flyway/flyway:10-alpine
    container_name: scm_flyway
    command: -url=jdbc:postgresql://db:5432/scmdb -user=scmuser -password=${DB_PASSWORD} migrate
    volumes:
      - ./db/migrations:/flyway/sql
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
