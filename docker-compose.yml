version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scmdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: scm-api
    ports:
      - "8080:8080"
    environment:
      ENV: dev
      DB_HOST: postgres
      DB_NAME: scmdev
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: ./web
    container_name: scm-web
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
